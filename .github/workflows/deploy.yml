name: Build and Deploy

on: 
  workflow_dispatch: 

permissions:
  contents: read
  security-events: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: npm audit
        run: |
          npm install
          npm audit --audit-level=moderate

      - name: Build image
        run: |
          docker build -t myapp:latest .

      - name: Sign in to Azure
        uses: azure/login@v2
        with:
          creds: ${{secrets.AZURE_CREDENTIALS}}

      - name: Push to ACR
        run: |
          az acr login -n labdeployacrvincent
          docker tag myapp:latest labdeployacrvincent.azurecr.io/myapp:latest
          docker push labdeployacrvincent.azurecr.io/myapp:latest

      - name: Deploy to WebApp
        run: |
          az webapp config container set \
          -g RGLabDeploy-Vincent \
          -n labdeploy-webapp-Vincent \
          --container-image-name labdeployacrvincent.azurecr.io/myapp:latest \
          --container-registry-url https://labdeployacrvincent.azurecr.io \
          --container-registry-user ${{secrets.ACR_USER}} \
          --container-registry-password ${{secrets.ACR_PWD}}
